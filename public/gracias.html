<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias — Westlink</title>
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1A0A0A, #2D1810);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      color: white;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.7); font-size: 15px; line-height: 1.7; margin-bottom: 8px; }
    .highlight { color: #fbbf24; font-weight: 600; }
    .btn {
      display: inline-block;
      margin-top: 24px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: white;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s;
    }
    .btn:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(245,158,11,0.3); }
    .phone { margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.5); }
    .phone a { color: #fbbf24; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>¡Gracias por tu interés!</h1>
    <p>Me llamo Dani y en breve te escribo para contarte cómo funciona.</p>
    <p>Mientras tanto, puedes ver la <a href="/demo.html" style="color:#fbbf24">demo aquí</a>.</p>
    <a href="/" class="btn">Volver a la web</a>
    <div class="phone">¿Prefieres hablar ya? <a href="tel:+34648253217">648 25 32 17</a></div>
  </div>
</body>
</html>
